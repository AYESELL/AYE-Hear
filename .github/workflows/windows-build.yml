name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      build_installer:
        description: "Build NSIS installer (requires NSIS on runner)"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    name: Validate (tests + lint)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/ayehear --ignore-missing-imports

      - name: Run tests
        run: pytest tests -q --cov=src --cov-report=term-missing

      - name: Syntax smoke check
        run: python -m compileall src

  package:
    name: Package (PyInstaller onedir)
    runs-on: windows-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.9"

      - name: Read version from pyproject.toml
        id: version
        shell: pwsh
        run: |
          $v = python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])"
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Ensure build directory exists
        shell: pwsh
        run: |
          if (-not (Test-Path "build")) { New-Item -ItemType Directory -Path "build" | Out-Null }

      - name: Generate PyInstaller spec (if not present)
        shell: pwsh
        run: |
          if (-not (Test-Path "build\aye-hear.spec")) {
              $specContent = @"
          # -*- mode: python ; coding: utf-8 -*-
          import os, sys
          block_cipher = None
          a = Analysis(
              ['../src/ayehear/__main__.py'],
              pathex=['../src'],
              binaries=[],
              datas=[
                ('../config/', 'config'),
                ('../src/ayehear/storage/migrations/', 'ayehear/storage/migrations'),
              ],
              hiddenimports=[
                  'ayehear.storage',
                  'ayehear.storage.orm',
                  'ayehear.storage.migrations',
                  'psycopg',
                  'psycopg.adapt',
                  'PySide6.QtWidgets',
                  'PySide6.QtCore',
                  'PySide6.QtGui',
              ],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=['pyannote.audio', 'silero_vad', 'ollama'],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
          exe = EXE(
              pyz, a.scripts, [],
              exclude_binaries=True,
              name='AyeHear',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=False,
              console=False,
              uac_admin=False,
          )
          coll = COLLECT(
              exe, a.binaries, a.zipfiles, a.datas,
              strip=False,
              upx=False,
              upx_exclude=[],
              name='AyeHear',
          )
          "@
              # Strip leading YAML-alignment whitespace (18 spaces) from each line
              $specContent = ($specContent -split "`n" | ForEach-Object { $_ -replace '^[ ]{18}', '' }) -join "`n"
              Set-Content -Path "build\aye-hear.spec" -Value $specContent -Encoding UTF8
              Write-Host "Generated build\aye-hear.spec"
          } else {
              Write-Host "Using existing build\aye-hear.spec"
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller build\aye-hear.spec --noconfirm --clean
          Write-Host "PyInstaller build completed"

      - name: Write version file into bundle
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          Set-Content -Path "dist\AyeHear\aye_hear_version.txt" -Value $v -Encoding UTF8
          Write-Host "Version $v written to bundle"

      - name: Verify bundle startup (import check)
        shell: pwsh
        run: |
          if (Test-Path "dist\AyeHear\AyeHear.exe") {
              Write-Host "AyeHear.exe found in bundle — bundle structure OK"
          } else {
              Write-Error "AyeHear.exe missing from dist\AyeHear"
              exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AyeHear-Windows-${{ steps.version.outputs.version }}
          path: dist\AyeHear\
          retention-days: 30

  installer:
    name: NSIS Installer (manual trigger only)
    runs-on: windows-latest
    needs: package
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_installer == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          pattern: AyeHear-Windows-*
          path: dist\AyeHear\
          merge-multiple: true

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          refreshenv

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = Get-Content "dist\AyeHear\aye_hear_version.txt"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $scriptPath = (Resolve-Path "build\installer\ayehear-installer.nsi").Path
          $bundleDir = (Resolve-Path "dist\AyeHear").Path
          makensis /V2 `
            "/DPRODUCT_VERSION=${{ steps.version.outputs.version }}" `
            "/DDIST_DIR=$bundleDir" `
            $scriptPath
          Write-Host "Installer build completed"

      - name: Upload installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AyeHear-Setup-${{ steps.version.outputs.version }}
          path: dist\AyeHear-Setup-*.exe
          retention-days: 90
